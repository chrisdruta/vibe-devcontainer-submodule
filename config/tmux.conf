set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -s extended-keys on
set -as terminal-features ",xterm*:extkeys"
set -s escape-time 10
set -s focus-events on
set -g history-limit 50000
set -g mouse on
set -s set-clipboard on
# Not used by the harness's own image preview (that rides tmux's native
# sixel compositing — see scripts/show-image.sh) but kept on for tools that
# passthrough their own graphics.
set -g allow-passthrough on
# prefix + i: jump to (or create) the image review window. A dedicated
# full-window viewer is the only reliable sixel home on tmux 3.5a — images
# survive only while their window is active and are dropped by client
# redraws and pane resizes (tmux #4499/#4639/#5126) — so the viewer
# re-renders on entry. vibe-preview is the image-baked copy of
# scripts/preview-viewer.sh (see Dockerfile); the per-project harness path
# isn't known at image build time.
bind-key i run-shell "vibe-preview --focus '#{session_id}'"
