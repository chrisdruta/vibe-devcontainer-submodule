# Harness base config for `vibe review` and the tmux preview window. Used
# when the project ships no .vibe/yazi/yazi.toml; a project file
# replaces this wholesale (keep `linemode = "verdict"` to keep the ✓/✗
# badge column, and keep the [opener]/[open] block below to keep the
# surface read-only).
[mgr]
ratio = [1, 2, 5]    # wide preview pane — this surface is about pixels
sort_by = "mtime"
sort_reverse = true  # newest renders first
linemode = "verdict" # per-file ✓/✗ review badges (vibe.yazi plugin)

# READ-ONLY LOCK, opener half (keymap half in keymap.toml): defining
# [opener] and [open].rules directly (not prepend_rules/append_rules)
# replaces yazi's defaults wholesale — no $EDITOR, no system opener, no
# interactive-open escape hatch survives. Enter/o on anything views it
# through a pager; images are already rendered by the preview pane.
[opener]
view = [
	{ run = 'less -R -- "$@"', block = true, desc = "view (read-only pager)" },
]

[open]
rules = [
	{ url = "*", use = "view" },
]
