# Harness review keybindings (merged with the project's keymap.toml by
# scripts/review.sh — project entries come first, so a project can rebind
# these).
#
# READ-ONLY LOCK: vibe review/browse is a viewing surface — file
# operations and shell escape are unbound below (noop also hides them
# from the help panel). Yazi has no command console, so an unbound
# command is unreachable; the opener side of the lock lives in yazi.toml
# ([opener]/[open] replaced wholesale — everything views through a
# pager, $EDITOR does not exist here). A project that truly wants an
# operation back can prepend its own binding (its entries win), which
# keeps the lock a harness default rather than a cage.
[[mgr.prepend_keymap]]
on = ";"
run = "noop" # was: shell (interactive)

[[mgr.prepend_keymap]]
on = ":"
run = "noop" # was: shell --block

[[mgr.prepend_keymap]]
on = "d"
run = "noop" # was: remove (trash)

[[mgr.prepend_keymap]]
on = "D"
run = "noop" # was: remove --permanently

[[mgr.prepend_keymap]]
on = "a"
run = "noop" # was: create

[[mgr.prepend_keymap]]
on = "r"
run = "noop" # was: rename

[[mgr.prepend_keymap]]
on = "x"
run = "noop" # was: cut

[[mgr.prepend_keymap]]
on = "p"
run = "noop" # was: paste

[[mgr.prepend_keymap]]
on = "P"
run = "noop" # was: paste --force

[[mgr.prepend_keymap]]
on = "A"
run = "plugin vibe -- approve"
desc = "Approve hovered file (vibe review)"

[[mgr.prepend_keymap]]
on = "R"
run = "plugin vibe -- reject"
desc = "Reject hovered file, optional note (vibe review)"

[[mgr.prepend_keymap]]
on = ["g", "i"]
run = "plugin vibe -- goto-last"
desc = "Jump to the last agent image (vibe review)"
