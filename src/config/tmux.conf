set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -s extended-keys on
set -as terminal-features ",xterm*:extkeys"
set -s escape-time 10
set -s focus-events on
set -g history-limit 50000
set -g mouse on
set -s set-clipboard on
# yazi (the review window / vibe review) and other graphics tools need
# passthrough plus the real outer terminal identity to pick the right image
# protocol; vibe show rides tmux's native sixel compositing either way.
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
# Declare clients sixel-capable: under vibe ui this server's client is the
# host tmux 3.7b (which never advertises sixel in DA), and the declaration
# is what makes show-image.sh's native-ingest path fire — this server then
# ingests raw sixel and re-emits it on every redraw, the only rendering
# that survives nesting (passthrough is one transient copy the outer tmux
# wipes on the next repaint). '*' asserts vibe's supported surfaces (WT
# >= 1.22, host tmux 3.7b) do sixel; a truly sixel-less terminal renders
# escape garbage under passthrough anyway, so nothing is lost.
set -as terminal-features ",*:sixel"
# prefix + i: jump to (or create) the image review window — a yazi instance
# the Claude Code hook feeds via DDS (`ya emit-to <id> reveal PATH`). A
# dedicated full window (not a split) because tmux 3.5a drops sixel images
# on client redraws and pane resizes (tmux #4499/#4639/#5126); yazi repaints
# its own pane, a passive split could not. vibe-preview is the image-baked
# copy of scripts/review.sh (see Dockerfile); the per-project harness path
# isn't known at image build time.
bind-key i run-shell "vibe-preview --focus '#{session_id}'"
